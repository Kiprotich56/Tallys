openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Tally's Barbershop & Beauty Studio API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: services
  - name: staff
  - name: appointments
  - name: customers
  - name: loyalty
  - name: reviews
  - name: dashboard
  - name: mpesa

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ───────────────────── SERVICES ─────────────────────
  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List all services
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
        "404":
          description: Not found
    patch:
      operationId: updateService
      tags: [services]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ───────────────────── STAFF ─────────────────────
  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Staff"
    post:
      operationId: createStaff
      tags: [staff]
      summary: Create staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"

  /staff/{id}:
    get:
      operationId: getStaffMember
      tags: [staff]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
        "404":
          description: Not found
    patch:
      operationId: updateStaff
      tags: [staff]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"

  /staff/availability:
    get:
      operationId: getStaffAvailability
      tags: [staff]
      parameters:
        - name: staffId
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Availability"

  # ───────────────────── CUSTOMERS ─────────────────────
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Register a customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found
    patch:
      operationId: updateCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}/appointments:
    get:
      operationId: getCustomerAppointments
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

  # ───────────────────── APPOINTMENTS ─────────────────────
  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: date
          in: query
          required: false
          schema:
            type: string
        - name: staffId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Book an appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found
    patch:
      operationId: updateAppointment
      tags: [appointments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
    delete:
      operationId: cancelAppointment
      tags: [appointments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cancelled

  /appointments/{id}/confirm:
    patch:
      operationId: confirmAppointment
      tags: [appointments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  /appointments/{id}/complete:
    patch:
      operationId: completeAppointment
      tags: [appointments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"

  # ───────────────────── REVIEWS ─────────────────────
  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List approved reviews
      parameters:
        - name: serviceId
          in: query
          required: false
          schema:
            type: integer
        - name: staffId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/{id}/approve:
    patch:
      operationId: approveReview
      tags: [reviews]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/{id}/hide:
    patch:
      operationId: hideReview
      tags: [reviews]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  # ───────────────────── LOYALTY ─────────────────────
  /loyalty/{customerId}:
    get:
      operationId: getLoyalty
      tags: [loyalty]
      summary: Get loyalty status for a customer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loyalty"

  /loyalty/{customerId}/redeem:
    post:
      operationId: redeemLoyalty
      tags: [loyalty]
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoyaltyRedemption"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Loyalty"

  # ───────────────────── DASHBOARD (wow endpoints) ─────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Revenue, appointments, customer counts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/revenue:
    get:
      operationId: getRevenueTrend
      tags: [dashboard]
      summary: Daily revenue for last 30 days
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenuePoint"

  /dashboard/services/popularity:
    get:
      operationId: getServicePopularity
      tags: [dashboard]
      summary: Top services by bookings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ServicePopularity"

  /dashboard/staff/performance:
    get:
      operationId: getStaffPerformance
      tags: [dashboard]
      summary: Staff revenue and completion stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StaffPerformance"

  /dashboard/appointments/today:
    get:
      operationId: getTodayAppointments
      tags: [dashboard]
      summary: Today's appointments
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"

  # ───────────────────── MPESA ─────────────────────
  /mpesa/stk-push:
    post:
      operationId: initiateMpesaPayment
      tags: [mpesa]
      summary: Initiate M-Pesa STK Push payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MpesaStkPushBody"
      responses:
        "200":
          description: STK Push initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MpesaStkPushResponse"
        "503":
          description: M-Pesa service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /mpesa/status:
    get:
      operationId: getMpesaPaymentStatus
      tags: [mpesa]
      summary: Query M-Pesa payment status
      parameters:
        - name: checkoutRequestId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MpesaStatusResponse"

  /mpesa/callback:
    post:
      operationId: mpesaCallback
      tags: [mpesa]
      summary: M-Pesa payment result callback (Safaricom webhook)
      responses:
        "200":
          description: Accepted

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ─── SERVICE ───
    Service:
      type: object
      required: [id, name, category, priceKes, durationMinutes, isActive]
      properties:
        id:           { type: integer }
        name:         { type: string }
        description:  { type: ["string", "null"] }
        category:     { type: string }
        priceKes:     { type: integer }
        durationMinutes: { type: integer }
        isActive:     { type: boolean }
        createdAt:    { type: string }

    ServiceInput:
      type: object
      required: [name, category, priceKes, durationMinutes]
      properties:
        name:         { type: string, minLength: 1 }
        description:  { type: string }
        category:     { type: string }
        priceKes:     { type: integer }
        durationMinutes: { type: integer }
        isActive:     { type: boolean }

    ServiceUpdate:
      type: object
      properties:
        name:         { type: string, minLength: 1 }
        description:  { type: string }
        category:     { type: string }
        priceKes:     { type: integer }
        durationMinutes: { type: integer }
        isActive:     { type: boolean }

    # ─── STAFF ───
    Staff:
      type: object
      required: [id, name, role, specializations, isActive]
      properties:
        id:             { type: integer }
        name:           { type: string }
        role:           { type: string }
        bio:            { type: ["string", "null"] }
        photoUrl:       { type: ["string", "null"] }
        specializations:
          type: array
          items: { type: string }
        rating:         { type: ["number", "null"] }
        commissionPct:  { type: integer }
        isActive:       { type: boolean }
        completedServices: { type: integer }
        revenueGenerated:  { type: integer }

    StaffInput:
      type: object
      required: [name, role]
      properties:
        name:           { type: string, minLength: 1 }
        role:           { type: string }
        bio:            { type: string }
        photoUrl:       { type: string }
        specializations:
          type: array
          items: { type: string }
        commissionPct:  { type: integer }
        isActive:       { type: boolean }

    StaffUpdate:
      type: object
      properties:
        name:           { type: string }
        role:           { type: string }
        bio:            { type: string }
        photoUrl:       { type: string }
        specializations:
          type: array
          items: { type: string }
        commissionPct:  { type: integer }
        isActive:       { type: boolean }

    Availability:
      type: object
      required: [staffId, date, slots]
      properties:
        staffId: { type: integer }
        date:    { type: string }
        slots:
          type: array
          items: { type: string }

    # ─── CUSTOMER ───
    Customer:
      type: object
      required: [id, name, phone, gender, loyaltyTier, loyaltyPoints, totalVisits, totalSpentKes]
      properties:
        id:             { type: integer }
        name:           { type: string }
        phone:          { type: string }
        email:          { type: ["string", "null"] }
        gender:         { type: ["string", "null"] }
        birthday:       { type: ["string", "null"] }
        loyaltyTier:    { type: string }
        loyaltyPoints:  { type: integer }
        totalVisits:    { type: integer }
        totalSpentKes:  { type: integer }
        createdAt:      { type: string }

    CustomerInput:
      type: object
      required: [name, phone]
      properties:
        name:     { type: string, minLength: 1 }
        phone:    { type: string, minLength: 1 }
        email:    { type: string }
        gender:   { type: string }
        birthday: { type: string }

    CustomerUpdate:
      type: object
      properties:
        name:     { type: string }
        phone:    { type: string }
        email:    { type: string }
        gender:   { type: string }
        birthday: { type: string }

    # ─── APPOINTMENT ───
    Appointment:
      type: object
      required: [id, customerId, serviceId, staffId, date, timeSlot, status, totalKes]
      properties:
        id:           { type: integer }
        customerId:   { type: integer }
        serviceId:    { type: integer }
        staffId:      { type: integer }
        date:         { type: string }
        timeSlot:     { type: string }
        status:       { type: string }
        notes:        { type: ["string", "null"] }
        totalKes:     { type: integer }
        customerName: { type: ["string", "null"] }
        serviceName:  { type: ["string", "null"] }
        staffName:    { type: ["string", "null"] }
        createdAt:    { type: string }

    AppointmentInput:
      type: object
      required: [customerId, serviceId, staffId, date, timeSlot]
      properties:
        customerId: { type: integer }
        serviceId:  { type: integer }
        staffId:    { type: integer }
        date:       { type: string }
        timeSlot:   { type: string }
        notes:      { type: string }

    AppointmentUpdate:
      type: object
      properties:
        staffId:   { type: integer }
        date:      { type: string }
        timeSlot:  { type: string }
        status:    { type: string }
        notes:     { type: string }

    # ─── REVIEW ───
    Review:
      type: object
      required: [id, customerId, serviceId, rating, status]
      properties:
        id:           { type: integer }
        customerId:   { type: integer }
        serviceId:    { type: ["integer", "null"] }
        staffId:      { type: ["integer", "null"] }
        rating:       { type: integer }
        comment:      { type: ["string", "null"] }
        status:       { type: string }
        customerName: { type: ["string", "null"] }
        serviceName:  { type: ["string", "null"] }
        createdAt:    { type: string }

    ReviewInput:
      type: object
      required: [customerId, rating]
      properties:
        customerId: { type: integer }
        serviceId:  { type: integer }
        staffId:    { type: integer }
        rating:     { type: integer }
        comment:    { type: string }

    # ─── LOYALTY ───
    Loyalty:
      type: object
      required: [customerId, tier, points, totalVisits, benefits]
      properties:
        customerId:  { type: integer }
        tier:        { type: string }
        points:      { type: integer }
        totalVisits: { type: integer }
        nextTier:    { type: ["string", "null"] }
        visitsToNextTier: { type: ["integer", "null"] }
        benefits:
          type: array
          items: { type: string }

    LoyaltyRedemption:
      type: object
      required: [points]
      properties:
        points: { type: integer }
        reason: { type: string }

    # ─── DASHBOARD ───
    DashboardSummary:
      type: object
      required: [dailyRevenue, weeklyRevenue, monthlyRevenue, totalCustomers, todayAppointments, activeAppointments, pendingAppointments, completedToday, repeatCustomerRate]
      properties:
        dailyRevenue:        { type: integer }
        weeklyRevenue:       { type: integer }
        monthlyRevenue:      { type: integer }
        totalCustomers:      { type: integer }
        todayAppointments:   { type: integer }
        activeAppointments:  { type: integer }
        pendingAppointments: { type: integer }
        completedToday:      { type: integer }
        repeatCustomerRate:  { type: number }

    RevenuePoint:
      type: object
      required: [date, revenue, appointments]
      properties:
        date:         { type: string }
        revenue:      { type: integer }
        appointments: { type: integer }

    ServicePopularity:
      type: object
      required: [serviceId, serviceName, category, bookings, revenueKes]
      properties:
        serviceId:   { type: integer }
        serviceName: { type: string }
        category:    { type: string }
        bookings:    { type: integer }
        revenueKes:  { type: integer }

    StaffPerformance:
      type: object
      required: [staffId, name, completedServices, revenueKes, avgRating]
      properties:
        staffId:           { type: integer }
        name:              { type: string }
        completedServices: { type: integer }
        revenueKes:        { type: integer }
        avgRating:         { type: number }

    # ─── MPESA ───
    MpesaStkPushBody:
      type: object
      required: [phone, amountKes, accountRef, description]
      properties:
        phone:
          type: string
          description: "Customer phone in format 2547XXXXXXXX or 07XXXXXXXX (auto-normalized)"
        amountKes:
          type: integer
          description: Amount in KES
        accountRef:
          type: string
          description: "Account reference (e.g. appointment ID or service name)"
        description:
          type: string
          description: "Transaction description shown to customer"

    MpesaStkPushResponse:
      type: object
      required: [checkoutRequestId, responseCode, responseDescription]
      properties:
        checkoutRequestId:
          type: string
        merchantRequestId:
          type: string
        responseCode:
          type: string
        responseDescription:
          type: string
        customerMessage:
          type: string
        simulated:
          type: boolean
          description: "True when running in simulation mode (no real Daraja credentials)"

    MpesaStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, success, failed]
        resultCode:
          type: string
        resultDesc:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
